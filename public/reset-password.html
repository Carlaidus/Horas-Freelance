<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VFX Hours — Nueva contraseña</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06060f; --card: #101022; --border: #1a1a35; --border2: #242445;
      --gold: #f5c842; --gold2: #e8a800; --gold-glow: rgba(245,200,66,0.12);
      --text: #dde0f5; --text2: #9090b8; --text3: #555580;
      --red: #ff5576; --green: #52e875;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .wrap { width: 100%; max-width: 420px; }
    .logo { text-align: center; margin-bottom: 36px; }
    .logo-icon {
      width: 56px; height: 56px; background: var(--gold-glow); border: 1px solid var(--gold2);
      border-radius: 14px; display: inline-flex; align-items: center; justify-content: center;
      color: var(--gold); margin-bottom: 14px;
    }
    .logo-icon svg { width: 26px; height: 26px; }
    .logo h1 { font-size: 22px; font-weight: 700; letter-spacing: 3px; color: var(--gold); }
    .logo p { font-size: 12px; color: var(--text3); letter-spacing: 2px; margin-top: 3px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }
    .card h2 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .card p { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
    .field { margin-bottom: 16px; }
    label { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; color: var(--text2); text-transform: uppercase; display: block; margin-bottom: 6px; }
    input {
      width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 8px;
      color: var(--text); padding: 11px 14px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--gold2); }
    .btn { width: 100%; padding: 13px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn:hover { background: var(--gold2); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg { background: rgba(255,85,118,0.1); border: 1px solid rgba(255,85,118,0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--red); display: none; margin-bottom: 16px; }
    .error-msg.visible { display: block; }
    .success-msg { background: rgba(82,232,117,0.08); border: 1px solid rgba(82,232,117,0.25); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--green); display: none; margin-bottom: 16px; }
    .success-msg.visible { display: block; }
    .pw-strength { margin-top: 6px; }
    .pw-bars { display: flex; gap: 4px; margin-bottom: 5px; }
    .pw-bar { flex: 1; height: 3px; border-radius: 2px; background: var(--border2); transition: background 0.3s; }
    .pw-bar.active-1 { background: var(--red); }
    .pw-bar.active-2 { background: #f5a623; }
    .pw-bar.active-3 { background: var(--gold); }
    .pw-bar.active-4 { background: var(--green); }
    .pw-hint { font-size: 11px; color: var(--text3); }
    .pw-rule { display: inline-flex; align-items: center; gap: 3px; margin-right: 8px; }
    .pw-rule.ok { color: var(--green); }
    .pw-rule.ok::before { content: '✓ '; }
    .pw-rule:not(.ok)::before { content: '· '; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <h1>VFXHOURS</h1>
      <p>FREELANCE TRACKER</p>
    </div>

    <div class="card">
      <h2>Nueva contraseña</h2>
      <p>Elige una contraseña segura para tu cuenta.</p>

      <div id="invalid-token" style="display:none">
        <div class="error-msg visible">Este enlace es inválido o ha caducado. Solicita uno nuevo.</div>
        <a href="/login.html" style="display:block;text-align:center;color:var(--gold);font-size:13px;margin-top:12px">Volver al inicio de sesión</a>
      </div>

      <form id="reset-form" onsubmit="doReset(event)">
        <div id="reset-error" class="error-msg"></div>
        <div id="reset-success" class="success-msg"></div>
        <div class="field">
          <label>Nueva contraseña</label>
          <input type="password" id="new-pass" placeholder="Mín. 8 car., mayúscula, número y símbolo" required autocomplete="new-password" oninput="checkStrength(this.value)">
          <div class="pw-strength" id="pw-strength" style="display:none">
            <div class="pw-bars">
              <div class="pw-bar" id="bar1"></div>
              <div class="pw-bar" id="bar2"></div>
              <div class="pw-bar" id="bar3"></div>
              <div class="pw-bar" id="bar4"></div>
            </div>
            <div class="pw-hint">
              <span class="pw-rule" id="r-len">8+ caracteres</span>
              <span class="pw-rule" id="r-upper">Mayúscula</span>
              <span class="pw-rule" id="r-num">Número</span>
              <span class="pw-rule" id="r-sym">Símbolo</span>
            </div>
          </div>
        </div>
        <div class="field">
          <label>Confirmar contraseña</label>
          <input type="password" id="new-pass2" placeholder="Repite la contraseña" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn" id="btn-reset">Guardar contraseña</button>
      </form>
    </div>
  </div>

  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.getElementById('reset-form').style.display = 'none';
      document.getElementById('invalid-token').style.display = 'block';
    }

    function checkStrength(val) {
      const el = document.getElementById('pw-strength');
      el.style.display = val.length > 0 ? '' : 'none';
      const rules = { len: val.length >= 8, upper: /[A-Z]/.test(val), num: /\d/.test(val), sym: /[^A-Za-z0-9]/.test(val) };
      document.getElementById('r-len').classList.toggle('ok', rules.len);
      document.getElementById('r-upper').classList.toggle('ok', rules.upper);
      document.getElementById('r-num').classList.toggle('ok', rules.num);
      document.getElementById('r-sym').classList.toggle('ok', rules.sym);
      const score = Object.values(rules).filter(Boolean).length;
      for (let i = 1; i <= 4; i++) {
        document.getElementById('bar' + i).className = 'pw-bar' + (i <= score ? ' active-' + score : '');
      }
    }

    async function doReset(e) {
      e.preventDefault();
      document.getElementById('reset-error').classList.remove('visible');
      const pass = document.getElementById('new-pass').value;
      const pass2 = document.getElementById('new-pass2').value;
      if (pass !== pass2) {
        const el = document.getElementById('reset-error');
        el.textContent = 'Las contraseñas no coinciden'; el.classList.add('visible'); return;
      }
      const btn = document.getElementById('btn-reset');
      btn.disabled = true; btn.textContent = 'Guardando...';
      try {
        const r = await fetch('/api/auth/reset-password', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: pass })
        });
        const data = await r.json();
        if (!r.ok) {
          if (data.error?.includes('inválido') || data.error?.includes('caducado')) {
            document.getElementById('reset-form').style.display = 'none';
            document.getElementById('invalid-token').style.display = 'block'; return;
          }
          const el = document.getElementById('reset-error');
          el.textContent = data.error; el.classList.add('visible');
          btn.disabled = false; btn.textContent = 'Guardar contraseña'; return;
        }
        const s = document.getElementById('reset-success');
        s.textContent = 'Contraseña actualizada. Redirigiendo...'; s.classList.add('visible');
        document.getElementById('new-pass').disabled = true;
        document.getElementById('new-pass2').disabled = true;
        btn.disabled = true;
        setTimeout(() => window.location.href = '/login.html', 2000);
      } catch {
        const el = document.getElementById('reset-error');
        el.textContent = 'Error de conexión'; el.classList.add('visible');
        btn.disabled = false; btn.textContent = 'Guardar contraseña';
      }
    }
  </script>
</body>
</html>
