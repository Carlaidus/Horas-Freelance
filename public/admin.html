<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — VFX Hours</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06060f; --bg2: #0a0a18; --card: #101022; --card2: #13132a;
      --border: #1a1a35; --border2: #242445;
      --gold: #f5c842; --cyan: #4ecdc4; --green: #52e875; --red: #ff5576; --amber: #ff9f43;
      --text: #dde0f5; --text2: #9090b8; --text3: #555580;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    a { color: var(--text2); text-decoration: none; }
    button { cursor: pointer; font-family: inherit; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px; background: var(--card); border-bottom: 1px solid var(--border);
    }
    .topbar-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; color: var(--gold); font-size: 15px; }
    .topbar-logo span { color: var(--text3); font-weight: 400; font-size: 12px; }
    .topbar-actions { display: flex; gap: 10px; }

    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .stat-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 700; font-family: 'Space Mono', monospace; }
    .stat-value.gold { color: var(--gold); }
    .stat-value.cyan { color: var(--cyan); }
    .stat-value.green { color: var(--green); }

    .section-title { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-bottom: 16px; }

    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th { padding: 12px 16px; text-align: left; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: var(--text3); text-transform: uppercase; background: var(--card2); border-bottom: 1px solid var(--border); }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--card2); }
    tbody td { padding: 14px 16px; font-size: 13px; vertical-align: middle; }
    td.mono { font-family: 'Space Mono', monospace; font-size: 12px; }
    td.dim { color: var(--text2); }

    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
    .badge-free { background: rgba(85,85,128,0.2); color: var(--text3); border: 1px solid var(--border2); }
    .badge-free::before { background: var(--text3); }
    .badge-basic { background: rgba(78,205,196,0.12); color: var(--cyan); border: 1px solid rgba(78,205,196,0.3); }
    .badge-basic::before { background: var(--cyan); }
    .badge-pro { background: rgba(245,200,66,0.12); color: var(--gold); border: 1px solid rgba(245,200,66,0.3); }
    .badge-pro::before { background: var(--gold); }
    .badge-admin { background: rgba(150,120,255,0.15); color: #a897ff; border: 1px solid rgba(150,120,255,0.3); }
    .badge-admin::before { background: #a897ff; }
    .badge-expired { background: rgba(255,85,118,0.12); color: var(--red); border: 1px solid rgba(255,85,118,0.3); }
    .badge-expired::before { background: var(--red); }

    .days-ok { color: var(--green); font-weight: 600; font-family: 'Space Mono', monospace; font-size: 12px; }
    .days-warn { color: var(--amber); font-weight: 600; font-family: 'Space Mono', monospace; font-size: 12px; }
    .days-expired { color: var(--red); font-weight: 600; font-family: 'Space Mono', monospace; font-size: 12px; }
    .days-unlimited { color: var(--text3); font-size: 12px; }

    .plan-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    select, input[type="date"] {
      background: var(--bg2); border: 1px solid var(--border2); color: var(--text);
      padding: 6px 10px; border-radius: 8px; font-size: 12px; font-family: inherit;
    }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; border: none; transition: all 0.15s; }
    .btn-primary { background: var(--gold); color: #000; }
    .btn-primary:hover { background: #e8a800; }
    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
    .btn-ghost:hover { background: var(--card2); color: var(--text); }
    .btn-sm { padding: 4px 10px; font-size: 11px; }

    .quick-btns { display: flex; gap: 4px; flex-wrap: wrap; }

    .user-name { font-weight: 600; }
    .user-email { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: 'Space Mono', monospace; }

    .empty { padding: 48px; text-align: center; color: var(--text3); }

    .toast {
      position: fixed; bottom: 24px; right: 24px; background: var(--green); color: #000;
      padding: 10px 20px; border-radius: 8px; font-weight: 600; font-size: 13px;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    VFX Hours <span>/ Panel Admin</span>
  </div>
  <div class="topbar-actions">
    <a href="/" class="btn btn-ghost">← Volver a la app</a>
  </div>
</div>

<div class="container">
  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="stat-label">Total usuarios</div><div class="stat-value" id="s-total">—</div></div>
    <div class="stat-card"><div class="stat-label">Plan Pro</div><div class="stat-value gold" id="s-pro">—</div></div>
    <div class="stat-card"><div class="stat-label">Plan Básico</div><div class="stat-value cyan" id="s-basic">—</div></div>
    <div class="stat-card"><div class="stat-label">Plan Free</div><div class="stat-value" style="color:var(--text3)" id="s-free">—</div></div>
  </div>

  <div class="section-title">Usuarios registrados</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Usuario</th>
          <th>Plan actual</th>
          <th>Días restantes</th>
          <th>Expira el</th>
          <th>Cambiar plan</th>
          <th>Añadir tiempo</th>
        </tr>
      </thead>
      <tbody id="users-tbody">
        <tr><td colspan="6" class="empty">Cargando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast">✓ Guardado</div>

<script>
let users = [];

async function load() {
  const res = await fetch('/admin/api/users');
  if (!res.ok) { document.body.innerHTML = '<p style="padding:40px;color:#ff5576">Acceso denegado</p>'; return; }
  users = await res.json();
  renderStats();
  renderTable();
}

function renderStats() {
  document.getElementById('s-total').textContent = users.length;
  document.getElementById('s-pro').textContent = users.filter(u => u.effective_plan === 'pro').length;
  document.getElementById('s-basic').textContent = users.filter(u => u.effective_plan === 'basic').length;
  document.getElementById('s-free').textContent = users.filter(u => u.effective_plan === 'free').length;
}

function planBadge(u) {
  if (u.role === 'admin') return '<span class="badge badge-admin">Admin</span>';
  const p = u.effective_plan;
  if (u.days_remaining !== null && u.days_remaining < 0) return '<span class="badge badge-expired">Expirado</span>';
  if (p === 'pro')   return '<span class="badge badge-pro">Pro</span>';
  if (p === 'basic') return '<span class="badge badge-basic">Básico</span>';
  return '<span class="badge badge-free">Free</span>';
}

function daysHtml(u) {
  if (u.role === 'admin') return '<span class="days-unlimited">Ilimitado</span>';
  if (u.effective_plan === 'free') return '<span class="days-unlimited">—</span>';
  if (u.days_remaining === null) return '<span class="days-unlimited">Sin límite</span>';
  if (u.days_remaining < 0) return `<span class="days-expired">${u.days_remaining} días</span>`;
  if (u.days_remaining <= 7) return `<span class="days-warn">${u.days_remaining} días</span>`;
  return `<span class="days-ok">${u.days_remaining} días</span>`;
}

function addMonths(n) {
  const d = new Date();
  d.setMonth(d.getMonth() + n);
  return d.toISOString().split('T')[0];
}

function addDaysToExpiry(userId, months) {
  const u = users.find(u => u.id === userId);
  if (!u) return;
  // Si ya tiene fecha futura, sumamos desde ahí; si no, desde hoy
  const base = (u.plan_expires_at && new Date(u.plan_expires_at) > new Date())
    ? new Date(u.plan_expires_at) : new Date();
  base.setMonth(base.getMonth() + months);
  const newDate = base.toISOString().split('T')[0];
  document.getElementById(`expires-${userId}`).value = newDate;
}

function renderTable() {
  const tbody = document.getElementById('users-tbody');
  if (!users.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">No hay usuarios registrados aún</td></tr>';
    return;
  }
  tbody.innerHTML = users.map(u => `
    <tr>
      <td>
        <div class="user-name">${u.name || '(sin nombre)'}</div>
        <div class="user-email">${u.email || '—'}</div>
      </td>
      <td>${planBadge(u)}</td>
      <td>${daysHtml(u)}</td>
      <td class="mono dim">${u.plan_expires_at || '—'}</td>
      <td>
        ${u.role === 'admin' ? '<span style="color:var(--text3);font-size:12px">—</span>' : `
        <div class="plan-controls">
          <select id="plan-${u.id}">
            <option value="free"  ${u.plan === 'free'  ? 'selected' : ''}>Free</option>
            <option value="basic" ${u.plan === 'basic' ? 'selected' : ''}>Básico</option>
            <option value="pro"   ${u.plan === 'pro'   ? 'selected' : ''}>Pro</option>
          </select>
          <input type="date" id="expires-${u.id}" value="${u.plan_expires_at || ''}">
          <button class="btn btn-primary btn-sm" onclick="savePlan(${u.id})">Guardar</button>
        </div>`}
      </td>
      <td>
        ${u.role === 'admin' ? '' : `
        <div class="quick-btns">
          <button class="btn btn-ghost btn-sm" onclick="addDaysToExpiry(${u.id},1)">+1m</button>
          <button class="btn btn-ghost btn-sm" onclick="addDaysToExpiry(${u.id},3)">+3m</button>
          <button class="btn btn-ghost btn-sm" onclick="addDaysToExpiry(${u.id},6)">+6m</button>
          <button class="btn btn-ghost btn-sm" onclick="addDaysToExpiry(${u.id},12)">+1a</button>
        </div>`}
      </td>
    </tr>
  `).join('');
}

async function savePlan(userId) {
  const plan = document.getElementById(`plan-${userId}`).value;
  const expires_at = document.getElementById(`expires-${userId}`).value || null;
  const res = await fetch(`/admin/api/users/${userId}/plan`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ plan, expires_at })
  });
  if (res.ok) {
    showToast();
    await load();
  }
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

load();
</script>
</body>
</html>
