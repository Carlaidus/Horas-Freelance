<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VFX Hours — Acceder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06060f; --card: #101022; --border: #1a1a35; --border2: #242445;
      --gold: #f5c842; --gold2: #e8a800; --gold-glow: rgba(245,200,66,0.12);
      --text: #dde0f5; --text2: #9090b8; --text3: #555580;
      --red: #ff5576; --green: #52e875;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.035;
    }
    .login-wrap { width: 100%; max-width: 420px; }

    .login-logo {
      text-align: center; margin-bottom: 36px;
    }
    .login-logo-icon {
      width: 56px; height: 56px;
      background: var(--gold-glow);
      border: 1px solid var(--gold2);
      border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--gold); margin-bottom: 14px;
    }
    .login-logo-icon svg { width: 26px; height: 26px; }
    .login-logo h1 { font-size: 22px; font-weight: 700; letter-spacing: 3px; color: var(--gold); }
    .login-logo p { font-size: 12px; color: var(--text3); letter-spacing: 2px; margin-top: 3px; }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
    }

    .tabs {
      display: flex; gap: 4px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 4px; margin-bottom: 28px;
    }
    .tab {
      flex: 1; padding: 9px; border: none;
      background: transparent; color: var(--text2);
      font-family: inherit; font-size: 13px; font-weight: 600;
      border-radius: 7px; transition: all 0.2s; cursor: pointer;
    }
    .tab.active { background: var(--border2); color: var(--gold); }

    .form { display: none; flex-direction: column; gap: 16px; }
    .form.active { display: flex; }

    label { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; color: var(--text2); text-transform: uppercase; display: block; margin-bottom: 6px; }
    input {
      width: 100%; background: var(--bg);
      border: 1px solid var(--border2); border-radius: 8px;
      color: var(--text); padding: 11px 14px; font-size: 14px;
      font-family: inherit; outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--gold2); }
    input::placeholder { color: var(--text3); }

    .btn-submit {
      width: 100%; padding: 13px;
      background: var(--gold); color: #000;
      border: none; border-radius: 8px;
      font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; margin-top: 4px;
    }
    .btn-submit:hover { background: var(--gold2); box-shadow: 0 0 20px rgba(245,200,66,0.3); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      background: rgba(255,85,118,0.1);
      border: 1px solid rgba(255,85,118,0.3);
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; color: var(--red);
      display: none;
    }
    .error-msg.visible { display: block; }

    .login-footer {
      text-align: center; margin-top: 20px;
      font-size: 12px; color: var(--text3);
    }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="login-wrap">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <h1>VFXHOURS</h1>
      <p>FREELANCE TRACKER</p>
    </div>

    <div class="login-card">
      <div class="tabs">
        <button class="tab active" id="tab-login" onclick="showTab('login')">Entrar</button>
        <button class="tab" id="tab-register" onclick="showTab('register')">Crear cuenta</button>
      </div>

      <!-- LOGIN -->
      <form class="form active" id="form-login" onsubmit="doLogin(event)">
        <div id="login-error" class="error-msg"></div>
        <div>
          <label>Email</label>
          <input type="email" id="login-email" placeholder="tu@email.com" required autocomplete="email">
        </div>
        <div>
          <label>Contraseña</label>
          <input type="password" id="login-pass" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-submit" id="btn-login">Entrar</button>
      </form>

      <!-- REGISTER -->
      <form class="form" id="form-register" onsubmit="doRegister(event)">
        <div id="register-error" class="error-msg"></div>
        <div>
          <label>Tu nombre</label>
          <input type="text" id="reg-name" placeholder="Carlos García" required>
        </div>
        <div>
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="tu@email.com" required autocomplete="email">
        </div>
        <div>
          <label>Contraseña</label>
          <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" required autocomplete="new-password">
        </div>
        <div>
          <label>Confirmar contraseña</label>
          <input type="password" id="reg-pass2" placeholder="Repite la contraseña" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn-submit" id="btn-register">Crear cuenta</button>
      </form>
    </div>

    <div class="login-footer">VFX Hours Tracker &nbsp;·&nbsp; Para compositores freelance</div>
  </div>

  <script>
    function showTab(tab) {
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('form-login').classList.toggle('active', tab === 'login');
      document.getElementById('form-register').classList.toggle('active', tab === 'register');
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('visible');
    }
    function clearError(id) {
      document.getElementById(id).classList.remove('visible');
    }

    async function doLogin(e) {
      e.preventDefault();
      clearError('login-error');
      const btn = document.getElementById('btn-login');
      btn.disabled = true; btn.textContent = 'Entrando...';
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('login-email').value, password: document.getElementById('login-pass').value })
        });
        const data = await r.json();
        if (!r.ok) { showError('login-error', data.error); btn.disabled = false; btn.textContent = 'Entrar'; return; }
        window.location.href = '/';
      } catch {
        showError('login-error', 'Error de conexión'); btn.disabled = false; btn.textContent = 'Entrar';
      }
    }

    async function doRegister(e) {
      e.preventDefault();
      clearError('register-error');
      const pass = document.getElementById('reg-pass').value;
      const pass2 = document.getElementById('reg-pass2').value;
      if (pass !== pass2) { showError('register-error', 'Las contraseñas no coinciden'); return; }
      const btn = document.getElementById('btn-register');
      btn.disabled = true; btn.textContent = 'Creando cuenta...';
      try {
        const r = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: document.getElementById('reg-name').value, email: document.getElementById('reg-email').value, password: pass })
        });
        const data = await r.json();
        if (!r.ok) { showError('register-error', data.error); btn.disabled = false; btn.textContent = 'Crear cuenta'; return; }
        window.location.href = '/';
      } catch {
        showError('register-error', 'Error de conexión'); btn.disabled = false; btn.textContent = 'Crear cuenta';
      }
    }
  </script>
</body>
</html>
