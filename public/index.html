<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VFX Hours">
  <title>VFX Hours — Freelance Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="grain-overlay"></div>
  <div class="scanlines"></div>

  <div class="app-layout" id="app">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-hex">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <div class="logo-text">
          <span class="logo-main">VFX</span>
          <span class="logo-sub">HOURS</span>
        </div>
        <button class="sidebar-toggle-btn" id="sidebar-toggle" onclick="VFX.toggleSidebar()" title="Colapsar panel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="dashboard" onclick="VFX.navigate('dashboard')" title="Dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          <span>Dashboard</span>
        </button>
        <button class="nav-item" data-view="proyecto" onclick="VFX.navigate('proyecto')" title="Proyecto en curso">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>Proyecto en curso</span>
        </button>
        <button class="nav-item" data-view="projects" onclick="VFX.navigate('projects')" title="Proyectos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
          <span>Proyectos</span>
        </button>
        <button class="nav-item" data-view="stats" onclick="VFX.navigate('stats')" title="Estadísticas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
          <span>Estadísticas</span>
        </button>
        <button class="nav-item" data-view="facturas" onclick="VFX.navigate('facturas')" title="Facturas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          <span>Facturas</span>
        </button>
        <button class="nav-item" data-view="companies" onclick="VFX.navigate('companies')" title="Empresas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 21h18M9 21V7l6-4v18M9 11h6M13 21v-4h-2v4"/></svg>
          <span>Empresas</span>
        </button>
        <button class="nav-item" data-view="planes" onclick="VFX.navigate('planes')" title="Planes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <span>Planes</span>
        </button>
        <button class="nav-item" data-view="ayuda" onclick="VFX.navigate('ayuda')" title="Ayuda">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".5" fill="currentColor"/></svg>
          <span>Ayuda</span>
        </button>
        <button class="nav-item" data-view="settings" onclick="VFX.navigate('settings')" title="Ajustes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <span>Ajustes</span>
        </button>
      </nav>

      <div class="sidebar-footer" onclick="VFX.navigate('settings')" title="Ajustes">
        <div class="user-avatar" id="sidebar-avatar">?</div>
        <div class="user-info-small">
          <span class="user-name-small" id="sidebar-name">Sin configurar</span>
          <span class="user-profession" id="sidebar-profession">VFX Compositor</span>
          <span id="sidebar-plan"></span>
          <span id="sidebar-expiry" style="display:none"></span>
        </div>
      </div>
      <div class="sidebar-status-bar">
        <button id="privacy-toggle" onclick="VFX.togglePrivacy()" title="Ocultar cifras (modo privacidad)">
          <svg id="privacy-icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="privacy-icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          <span class="privacy-label">Privacidad</span>
        </button>
        <div id="sidebar-signal"></div>
      </div>

      <a href="/admin" id="sidebar-admin-link" style="display:none;align-items:center;gap:8px;width:100%;padding:9px 14px;background:rgba(150,120,255,0.08);border:1px solid rgba(150,120,255,0.25);border-radius:8px;color:#a897ff;font-size:12px;font-weight:600;cursor:pointer;margin-top:6px;font-family:inherit;text-decoration:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span>Panel Admin</span>
      </a>
      <button id="sidebar-logout" onclick="VFX.logout()" style="display:none;align-items:center;gap:8px;width:100%;padding:9px 14px;background:transparent;border:1px solid rgba(255,85,118,0.2);border-radius:8px;color:var(--red);font-size:12px;font-weight:600;cursor:pointer;margin-top:6px;font-family:inherit" onmouseover="this.style.background='rgba(255,85,118,0.08)'" onmouseout="this.style.background='transparent'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Cerrar sesión</span>
      </button>
    </aside>
    <div id="sidebar-backdrop" onclick="VFX.toggleSidebar()"></div>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="main-content">
      <div id="view-dashboard" class="view active"></div>
      <div id="view-projects" class="view"></div>
      <div id="view-proyecto" class="view"></div>
      <div id="view-stats" class="view"></div>
      <div id="view-facturas" class="view"></div>
      <div id="view-companies" class="view"></div>
      <div id="view-planes" class="view"></div>
      <div id="view-settings" class="view"></div>
      <div id="view-ayuda" class="view"></div>
    </main>

  </div>

  <!-- MODAL OVERLAY -->
  <div class="modal-overlay" id="modal-overlay" onclick="VFX.closeModal(event)">
    <div class="modal" id="modal" onclick="event.stopPropagation()">
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="/js/help-content.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
