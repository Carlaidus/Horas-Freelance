<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VFX Hours — Acceder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06060f; --card: #101022; --border: #1a1a35; --border2: #242445;
      --gold: #f5c842; --gold2: #e8a800; --gold-glow: rgba(245,200,66,0.12);
      --text: #dde0f5; --text2: #9090b8; --text3: #555580;
      --red: #ff5576; --green: #52e875;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.035;
    }
    .login-wrap { width: 100%; max-width: 420px; }

    .login-logo { text-align: center; margin-bottom: 36px; }
    .login-logo-icon {
      width: 56px; height: 56px;
      background: var(--gold-glow); border: 1px solid var(--gold2); border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--gold); margin-bottom: 14px;
    }
    .login-logo-icon svg { width: 26px; height: 26px; }
    .login-logo h1 { font-size: 22px; font-weight: 700; letter-spacing: 3px; color: var(--gold); }
    .login-logo p { font-size: 12px; color: var(--text3); letter-spacing: 2px; margin-top: 3px; }

    .login-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }

    .tabs {
      display: flex; gap: 4px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 4px; margin-bottom: 28px;
    }
    .tab {
      flex: 1; padding: 9px; border: none;
      background: transparent; color: var(--text2);
      font-family: inherit; font-size: 13px; font-weight: 600;
      border-radius: 7px; transition: all 0.2s; cursor: pointer;
    }
    .tab.active { background: var(--border2); color: var(--gold); }

    .form { display: none; flex-direction: column; gap: 16px; }
    .form.active { display: flex; }

    label { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; color: var(--text2); text-transform: uppercase; display: block; margin-bottom: 6px; }
    input {
      width: 100%; background: var(--bg);
      border: 1px solid var(--border2); border-radius: 8px;
      color: var(--text); padding: 11px 14px; font-size: 14px;
      font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--gold2); }
    input::placeholder { color: var(--text3); }

    .btn-submit {
      width: 100%; padding: 13px;
      background: var(--gold); color: #000;
      border: none; border-radius: 8px;
      font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; margin-top: 4px;
    }
    .btn-submit:hover { background: var(--gold2); box-shadow: 0 0 20px rgba(245,200,66,0.3); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      background: rgba(255,85,118,0.1); border: 1px solid rgba(255,85,118,0.3);
      border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--red); display: none;
    }
    .error-msg.visible { display: block; }

    .success-msg {
      background: rgba(82,232,117,0.08); border: 1px solid rgba(82,232,117,0.25);
      border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--green); display: none;
    }
    .success-msg.visible { display: block; }

    .forgot-link {
      font-size: 12px; color: var(--text3); text-align: right;
      cursor: pointer; transition: color 0.2s; background: none; border: none;
      font-family: inherit; padding: 0; margin-top: -8px;
    }
    .forgot-link:hover { color: var(--gold); }

    /* Password strength */
    .pw-strength { margin-top: 6px; }
    .pw-bars { display: flex; gap: 4px; margin-bottom: 5px; }
    .pw-bar { flex: 1; height: 3px; border-radius: 2px; background: var(--border2); transition: background 0.3s; }
    .pw-bar.active-1 { background: var(--red); }
    .pw-bar.active-2 { background: #f5a623; }
    .pw-bar.active-3 { background: var(--gold); }
    .pw-bar.active-4 { background: var(--green); }
    .pw-hint { font-size: 11px; color: var(--text3); }
    .pw-rule { display: inline-flex; align-items: center; gap: 3px; margin-right: 8px; }
    .pw-rule.ok { color: var(--green); }
    .pw-rule.ok::before { content: '✓ '; }
    .pw-rule:not(.ok)::before { content: '· '; }

    .login-footer { text-align: center; margin-top: 20px; font-size: 12px; color: var(--text3); }

    .first-time-banner {
      background: var(--gold-glow); border: 1px solid rgba(245,200,66,0.2);
      border-radius: 10px; padding: 12px 16px; margin-bottom: 20px;
      font-size: 13px; color: var(--gold); display: none;
    }
    .first-time-banner.visible { display: block; }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="login-wrap">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <h1>VFXHOURS</h1>
      <p>FREELANCE TRACKER</p>
    </div>

    <div class="login-card">
      <div id="first-time-banner" class="first-time-banner">
        Primera vez aquí — crea tu cuenta para empezar
      </div>

      <div class="tabs" id="tabs-bar">
        <button class="tab active" id="tab-login" onclick="showTab('login')">Entrar</button>
        <button class="tab" id="tab-register" onclick="showTab('register')">Crear cuenta</button>
        <button class="tab" id="tab-forgot" onclick="showTab('forgot')" style="display:none">Recuperar</button>
      </div>

      <!-- LOGIN -->
      <form class="form active" id="form-login" onsubmit="doLogin(event)">
        <div id="login-error" class="error-msg"></div>
        <div>
          <label>Email</label>
          <input type="email" id="login-email" placeholder="tu@email.com" required autocomplete="email">
        </div>
        <div>
          <label>Contraseña</label>
          <input type="password" id="login-pass" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="button" class="forgot-link" onclick="showTab('forgot')">¿Olvidaste tu contraseña?</button>
        <button type="submit" class="btn-submit" id="btn-login">Entrar</button>
      </form>

      <!-- REGISTER -->
      <form class="form" id="form-register" onsubmit="doRegister(event)">
        <div id="register-error" class="error-msg"></div>
        <div>
          <label>Tu nombre</label>
          <input type="text" id="reg-name" placeholder="Carlos García" required>
        </div>
        <div>
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="tu@email.com" required autocomplete="email">
        </div>
        <div>
          <label>Contraseña</label>
          <input type="password" id="reg-pass" placeholder="Mín. 8 car., mayúscula, número y símbolo" required autocomplete="new-password" oninput="checkStrength(this.value)">
          <div class="pw-strength" id="pw-strength" style="display:none">
            <div class="pw-bars">
              <div class="pw-bar" id="bar1"></div>
              <div class="pw-bar" id="bar2"></div>
              <div class="pw-bar" id="bar3"></div>
              <div class="pw-bar" id="bar4"></div>
            </div>
            <div class="pw-hint">
              <span class="pw-rule" id="r-len">8+ caracteres</span>
              <span class="pw-rule" id="r-upper">Mayúscula</span>
              <span class="pw-rule" id="r-num">Número</span>
              <span class="pw-rule" id="r-sym">Símbolo</span>
            </div>
          </div>
        </div>
        <div>
          <label>Confirmar contraseña</label>
          <input type="password" id="reg-pass2" placeholder="Repite la contraseña" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn-submit" id="btn-register">Crear cuenta</button>
      </form>

      <!-- FORGOT PASSWORD -->
      <form class="form" id="form-forgot" onsubmit="doForgot(event)">
        <div id="forgot-error" class="error-msg"></div>
        <div id="forgot-success" class="success-msg"></div>
        <p style="font-size:13px;color:var(--text2);margin-bottom:4px">Introduce tu email y te enviaremos un enlace para restablecer la contraseña.</p>
        <div>
          <label>Email</label>
          <input type="email" id="forgot-email" placeholder="tu@email.com" required autocomplete="email">
        </div>
        <button type="submit" class="btn-submit" id="btn-forgot">Enviar enlace</button>
        <button type="button" class="forgot-link" style="text-align:center" onclick="showTab('login')">Volver al inicio de sesión</button>
      </form>
    </div>

    <div class="login-footer">VFX Hours Tracker &nbsp;·&nbsp; Para compositores freelance</div>
  </div>

  <script>
    // Check first time
    fetch('/api/auth/has-users').then(r => r.json()).then(d => {
      if (!d.hasUsers) {
        document.getElementById('first-time-banner').classList.add('visible');
        showTab('register');
      }
    }).catch(() => {});

    function showTab(tab) {
      ['login','register','forgot'].forEach(t => {
        document.getElementById('tab-' + t).classList.toggle('active', t === tab);
        document.getElementById('form-' + t).classList.toggle('active', t === tab);
      });
      document.getElementById('tab-forgot').style.display = tab === 'forgot' ? '' : 'none';
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg; el.classList.add('visible');
    }
    function clearError(id) { document.getElementById(id).classList.remove('visible'); }

    function checkStrength(val) {
      const el = document.getElementById('pw-strength');
      el.style.display = val.length > 0 ? '' : 'none';
      const rules = {
        len: val.length >= 8,
        upper: /[A-Z]/.test(val),
        num: /\d/.test(val),
        sym: /[^A-Za-z0-9]/.test(val)
      };
      document.getElementById('r-len').classList.toggle('ok', rules.len);
      document.getElementById('r-upper').classList.toggle('ok', rules.upper);
      document.getElementById('r-num').classList.toggle('ok', rules.num);
      document.getElementById('r-sym').classList.toggle('ok', rules.sym);
      const score = Object.values(rules).filter(Boolean).length;
      for (let i = 1; i <= 4; i++) {
        const bar = document.getElementById('bar' + i);
        bar.className = 'pw-bar' + (i <= score ? ' active-' + score : '');
      }
    }

    async function doLogin(e) {
      e.preventDefault();
      clearError('login-error');
      const btn = document.getElementById('btn-login');
      btn.disabled = true; btn.textContent = 'Entrando...';
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('login-email').value, password: document.getElementById('login-pass').value })
        });
        const data = await r.json();
        if (!r.ok) { showError('login-error', data.error); btn.disabled = false; btn.textContent = 'Entrar'; return; }
        window.location.href = '/';
      } catch { showError('login-error', 'Error de conexión'); btn.disabled = false; btn.textContent = 'Entrar'; }
    }

    async function doRegister(e) {
      e.preventDefault();
      clearError('register-error');
      const pass = document.getElementById('reg-pass').value;
      const pass2 = document.getElementById('reg-pass2').value;
      if (pass !== pass2) { showError('register-error', 'Las contraseñas no coinciden'); return; }
      const btn = document.getElementById('btn-register');
      btn.disabled = true; btn.textContent = 'Creando cuenta...';
      try {
        const r = await fetch('/api/auth/register', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: document.getElementById('reg-name').value, email: document.getElementById('reg-email').value, password: pass })
        });
        const data = await r.json();
        if (!r.ok) { showError('register-error', data.error); btn.disabled = false; btn.textContent = 'Crear cuenta'; return; }
        window.location.href = '/';
      } catch { showError('register-error', 'Error de conexión'); btn.disabled = false; btn.textContent = 'Crear cuenta'; }
    }

    async function doForgot(e) {
      e.preventDefault();
      clearError('forgot-error');
      document.getElementById('forgot-success').classList.remove('visible');
      const btn = document.getElementById('btn-forgot');
      btn.disabled = true; btn.textContent = 'Enviando...';
      try {
        const r = await fetch('/api/auth/forgot-password', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('forgot-email').value })
        });
        const data = await r.json();
        if (!r.ok) { showError('forgot-error', data.error); btn.disabled = false; btn.textContent = 'Enviar enlace'; return; }
        const s = document.getElementById('forgot-success');
        s.textContent = 'Si el email existe, recibirás el enlace en breve. Revisa también el spam.';
        s.classList.add('visible');
        btn.textContent = 'Enviado';
      } catch { showError('forgot-error', 'Error de conexión'); btn.disabled = false; btn.textContent = 'Enviar enlace'; }
    }
  </script>
</body>
</html>
